jdk:
  - openjdk17

before_install:
  - |
    echo "=== Installing native build dependencies ==="
    if command -v sudo >/dev/null 2>&1; then
      sudo apt-get update -qq
      sudo apt-get install -y -qq ninja-build curl pkg-config unzip
    elif command -v apt-get >/dev/null 2>&1; then
      apt-get update -qq
      apt-get install -y -qq ninja-build curl pkg-config unzip
    else
      echo "Error: neither sudo nor apt-get is available to install native build dependencies"
      exit 1
    fi
  - |
    echo "=== Installing Android command-line tools ==="
    curl -fsSL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o /tmp/cmdtools.zip
    mkdir -p "$ANDROID_HOME/cmdline-tools"
    unzip -q -o /tmp/cmdtools.zip -d /tmp/cmdtools-extract
    rm -rf "$ANDROID_HOME/cmdline-tools/latest"
    mv /tmp/cmdtools-extract/cmdline-tools "$ANDROID_HOME/cmdline-tools/latest"
    rm -rf /tmp/cmdtools.zip /tmp/cmdtools-extract
  - |
    echo "=== Installing Rust toolchain for DeepFilterNet ==="
    curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
    . "$HOME/.cargo/env"
    rustc --version
    cargo --version
    rustup target add aarch64-linux-android armv7-linux-androideabi
    cargo install cargo-ndk --locked
    cargo ndk --version
  - |
    echo "=== Installing Android NDK 28.0.12674087 ==="
    yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true
    "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;28.0.12674087" "cmake;3.22.1"
    echo "export ANDROID_NDK_ROOT=\"$ANDROID_HOME/ndk/28.0.12674087\"" > "$HOME/.jitpack-ndk-env"
    cat "$ANDROID_HOME/ndk/28.0.12674087/source.properties"

env:
  JITPACK: "true"

install:
  - |
    . "$HOME/.cargo/env"
    . "$HOME/.jitpack-ndk-env"
    export PATH="$ANDROID_HOME/cmake/3.22.1/bin:$PATH"
    echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT"
    cat "$ANDROID_NDK_ROOT/source.properties"
    cd kotlin && ./gradlew :audio-pipeline:publishToMavenLocal -xtest -xlint
